# Automatic Content Tags - default configuration
# Copy this file to digital-factory-data/karaf/etc/ and set the API key of your provider.
# NEVER commit a real API key to source control.

# Active provider: anthropic | openai | deepseek
llm.provider=anthropic

# Prompt sent before the extracted content text. The target tag language and the text
# are appended automatically.
llm.user.prompt=Generate between 5 and 10 relevant tags for the following text. Respond ONLY with a JSON array of strings, without markdown or explanations.

# Maximum tokens the model may generate
llm.max.tokens=1024

# Maximum number of characters of content text sent to the provider
llm.max.source.chars=6000

# Optional sampling temperature. Leave empty to use the provider default
# (recent Anthropic and OpenAI models reject non-default temperatures).
llm.temperature=

# --- Anthropic ---
anthropic.api.key=
anthropic.base.url=https://api.anthropic.com
anthropic.model=claude-sonnet-4-6

# --- OpenAI ---
openai.api.key=
openai.base.url=https://api.openai.com
openai.model=gpt-5-mini

# --- DeepSeek (OpenAI-compatible API) ---
deepseek.api.key=
deepseek.base.url=https://api.deepseek.com
deepseek.model=deepseek-chat
